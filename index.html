<body class="auth-locked">

<div id="authGate" class="auth-gate" role="dialog" aria-modal="true" aria-labelledby="authTitle">
  <form id="authForm" class="auth-card" autocomplete="off">
    <div class="auth-mark">QL</div>
    <p class="auth-eyebrow">Khu vực dữ liệu nội bộ</p>
    <h1 id="authTitle">Nhập mật khẩu để tiếp tục</h1>
    <p class="auth-copy">Trang QLNHV chỉ hiển thị dữ liệu sau khi xác thực.</p>
    <label class="auth-label" for="authPassword">Mật khẩu</label>
    <div class="auth-password-row">
      <input id="authPassword" class="auth-input" name="password" type="password" inputmode="text" autocomplete="current-password" required autofocus />
      <button id="authToggle" class="auth-toggle" type="button" aria-label="Hiện mật khẩu">Hiện</button>
    </div>
    <p id="authError" class="auth-error" role="alert" aria-live="polite"></p>
    <button class="auth-submit" type="submit">Mở khóa</button>
  </form>
</div>
